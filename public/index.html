<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repo Wiki</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --sidebar-bg: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --code-bg: #f6f8fa;
      --chat-user-bg: #dbeafe;
      --chat-ai-bg: #f6f8fa;
      --header-h: 52px;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── Header ── */
    #header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
    }
    .logo { font-weight: 700; font-size: 15px; color: var(--accent); white-space: nowrap; }
    .auth-opt {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      background: var(--sidebar-bg);
      color: var(--text-muted);
      cursor: pointer;
    }
    .auth-opt.active { background: var(--accent); color: #fff; }
    .auth-opt:hover:not(.active) { background: #eaeef2; }
    #api-key {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    #api-key:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
    #repo-path {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      min-width: 0;
    }
    #repo-path:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--sidebar-bg);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 500;
    }
    .btn:hover { background: #eaeef2; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    #spinner { display: none; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Layout ── */
    #layout {
      display: grid;
      grid-template-columns: 260px 1fr 0px;
      height: calc(100vh - var(--header-h));
      margin-top: var(--header-h);
      transition: grid-template-columns .25s ease;
    }
    #layout.chat-open { grid-template-columns: 260px 1fr 340px; }

    /* ── Sidebar ── */
    #sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
    }
    .project-info { padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .project-name { font-weight: 700; font-size: 14px; color: var(--text); }
    .project-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
    .nav-empty { padding: 16px; font-size: 13px; color: var(--text-muted); }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      border-radius: 0;
      transition: background .1s;
      user-select: none;
    }
    .nav-item:hover { background: #eaeef2; }
    .nav-item.active { background: #dbeafe; color: var(--accent); font-weight: 600; }
    .nav-item .toggle { width: 14px; font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
    .nav-item .icon { font-size: 13px; flex-shrink: 0; }
    .nav-children { display: none; }
    .nav-children.open { display: block; }
    .nav-children .nav-item { padding-left: 38px; }
    .nav-children .nav-children .nav-item { padding-left: 56px; }

    /* ── Main content ── */
    #content {
      overflow-y: auto;
      padding: 32px 48px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .welcome-icon { font-size: 48px; }
    .welcome-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .welcome-sub { font-size: 14px; }

    /* markdown content */
    #page-content { display: none; }
    #page-content h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    #page-content h2 { font-size: 20px; font-weight: 700; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    #page-content h3 { font-size: 16px; font-weight: 700; margin: 20px 0 8px; }
    #page-content p { line-height: 1.7; margin-bottom: 14px; font-size: 14px; }
    #page-content ul, #page-content ol { margin: 8px 0 14px 24px; font-size: 14px; line-height: 1.7; }
    #page-content li { margin-bottom: 4px; }
    #page-content code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; background: var(--code-bg); padding: 2px 5px; border-radius: 4px; border: 1px solid var(--border); }
    #page-content pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 14px 0; overflow-x: auto; }
    #page-content pre code { background: none; border: none; padding: 0; font-size: 12px; }
    #page-content table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
    #page-content th { background: var(--sidebar-bg); padding: 8px 12px; text-align: left; border: 1px solid var(--border); font-weight: 600; }
    #page-content td { padding: 8px 12px; border: 1px solid var(--border); }
    #page-content tr:nth-child(even) td { background: #fafafa; }
    #page-content blockquote { border-left: 4px solid var(--border); padding: 8px 16px; margin: 14px 0; color: var(--text-muted); font-size: 14px; }
    #page-content a { color: var(--accent); }

    #thinking-panel {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }
    #thinking-header {
      font-weight: 600;
      color: #92400e;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #thinking-arrow { font-size: 10px; transition: transform .2s; display: inline-block; }
    #thinking-arrow.open { transform: rotate(90deg); }
    #thinking-body {
      display: none;
      margin-top: 10px;
      color: #78350f;
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }
    #thinking-body.open { display: block; }
    .page-header { margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .page-title { font-size: 26px; font-weight: 700; flex: 1; }
    .page-loading { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 13px; padding: 16px 0; }
    .thinking-ticker { padding: 16px 0; }
    .thinking-ticker-header { display:flex;align-items:center;gap:6px;color:#92400e;font-size:12px;font-weight:600;margin-bottom:6px; }
    .thinking-spinner { width:10px;height:10px;border:1.5px solid #92400e;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0; }
    #thinking-lines-container { height:56px;overflow-y:auto;scrollbar-width:none;border-radius:6px;background:#fffbeb;padding:6px 10px; }
    #thinking-lines-container::-webkit-scrollbar { display:none; }
    #thinking-lines-inner { font-size:11px;color:#78350f;line-height:20px;white-space:pre-wrap;word-break:break-all; }

    /* ── Chat panel ── */
    #chat-panel {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    #layout:not(.chat-open) #chat-panel { display: none; }
    .chat-header { padding: 12px 16px; font-weight: 600; font-size: 13px; border-bottom: 1px solid var(--border); background: var(--sidebar-bg); display: flex; align-items: center; justify-content: space-between; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { max-width: 100%; font-size: 13px; line-height: 1.6; }
    .chat-msg.user { align-self: flex-end; background: var(--chat-user-bg); color: var(--text); padding: 8px 12px; border-radius: 12px 12px 2px 12px; max-width: 85%; }
    .chat-msg.assistant { align-self: flex-start; background: var(--chat-ai-bg); border: 1px solid var(--border); padding: 10px 12px; border-radius: 2px 12px 12px 12px; max-width: 100%; }
    .chat-msg.assistant p { margin-bottom: 8px; }
    .chat-msg.assistant p:last-child { margin-bottom: 0; }
    .chat-msg.assistant code { font-size: 11px; }
    .chat-msg.assistant pre { font-size: 11px; margin: 6px 0; }
    .chat-empty { text-align: center; padding: 32px 16px; color: var(--text-muted); font-size: 13px; }
    .chat-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
    #chat-input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; resize: none; min-height: 36px; max-height: 120px; font-family: inherit; line-height: 1.4; }
    #chat-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
    #chat-send { padding: 8px 14px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; cursor: pointer; font-weight: 500; white-space: nowrap; }
    #chat-send:hover { background: var(--accent-hover); }
    #chat-send:disabled { opacity: .6; cursor: not-allowed; }
  </style>
</head>
<body>
  <header id="header">
    <div class="logo">Repo Wiki</div>
    <div id="auth-toggle" style="display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0">
      <button class="auth-opt active" data-mode="claude-cli">Claude 订阅</button>
      <button class="auth-opt" data-mode="api-key">API Key</button>
    </div>
    <input id="api-key" type="password" placeholder="sk-ant-..." style="width:180px;font-family:monospace;display:none">
    <input id="repo-path" type="text" placeholder="/path/to/your/repo">
    <button id="browse-btn" class="btn" title="浏览文件系统">...</button>
    <button id="scan-btn" class="btn btn-primary">分析</button>
    <div id="spinner"></div>
    <button id="chat-toggle" class="btn">AI 问答</button>
  </header>

  <div id="layout">
    <nav id="sidebar">
      <div id="nav-header" class="project-info" style="display:none">
        <div class="project-name" id="project-name"></div>
        <div class="project-desc" id="project-desc"></div>
      </div>
      <div id="nav-tree">
        <div class="nav-empty">输入仓库路径并点击「分析」</div>
      </div>
    </nav>

    <div id="content">
      <div id="welcome">
        <div class="welcome-icon">📚</div>
        <div class="welcome-title">Repo Wiki</div>
        <div class="welcome-sub">支持任意本地代码仓库，AI 自动生成中文 Wiki</div>
      </div>
      <div id="page-content">
        <div class="page-header">
          <div class="page-title" id="page-title"></div>
          <button id="save-btn" class="btn" style="display:none;font-size:12px;padding:4px 10px" title="保存为 Markdown 文件">保存</button>
          <span id="save-tip" style="font-size:12px;color:var(--text-muted);display:none"></span>
        </div>
        <div id="thinking-panel" style="display:none">
          <div id="thinking-header" onclick="toggleThinking()">
            <span id="thinking-arrow">▶</span> 思考过程
          </div>
          <div id="thinking-body"></div>
        </div>
        <div id="page-body"></div>
      </div>
    </div>

    <div id="chat-panel">
      <div class="chat-header">
        <span>AI 问答</span>
        <button class="btn" id="clear-chat" style="padding:2px 8px;font-size:12px">清空</button>
      </div>
      <div id="chat-messages">
        <div class="chat-empty">问任何关于当前代码库的问题</div>
      </div>
      <div class="chat-footer">
        <textarea id="chat-input" placeholder="输入问题..." rows="1"></textarea>
        <button id="chat-send">发送</button>
      </div>
    </div>
  </div>

  <!-- Directory browser modal -->
  <div id="fs-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center">
    <div id="fs-dialog" style="background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.25);width:520px;max-height:70vh;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-weight:700;font-size:14px">选择代码仓目录</span>
        <button id="fs-close" class="btn" style="margin-left:auto;padding:3px 10px">✕</button>
      </div>
      <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <button id="fs-up" class="btn" style="padding:4px 10px;font-size:13px">↑ 上级</button>
        <span id="fs-current" style="font-family:monospace;font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      </div>
      <div id="fs-list" style="flex:1;overflow-y:auto;padding:8px 0"></div>
      <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px">
        <button id="fs-cancel" class="btn">取消</button>
        <button id="fs-select" class="btn btn-primary">选择此目录</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    function toggleThinking() {
      const arrow = document.getElementById('thinking-arrow');
      const body  = document.getElementById('thinking-body');
      arrow.classList.toggle('open');
      body.classList.toggle('open');
    }
  </script>
  <script src="app.js?v=6"></script>
</body>
</html>
